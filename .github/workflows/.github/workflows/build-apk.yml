name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build APK
        run: |
          cd mx_pro_player
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: UltraPlayer-APK
          path: mx_pro_player/build/app/outputs/flutter-apk/*.apk
